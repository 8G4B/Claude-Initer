name: Deploy Trigger Script

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create env file
        run: |
          printf 'TRIGGER_URL=%s\nTRIGGER_TOKEN=%s\n' \
            '${{ secrets.TRIGGER_URL }}' \
            '${{ secrets.TRIGGER_TOKEN }}' \
            > trigger.env

      - name: Deploy via SSH Remote Deploy
        uses: 8G4B/GSM-SV-Deploy@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          user: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          target_path: ~/claude-initer
